name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci || npm install
          # Fix for Tailwind Oxide native binding issue in CI
          npm install @tailwindcss/oxide-linux-x64-gnu

      - name: Build Web Application
        run: |
          npm run build
          # Verify dist exists and is not empty
          if [ ! -d "dist" ]; then echo "dist directory missing!" && exit 1; fi
          if [ -z "$(ls -A dist)" ]; then echo "dist directory is empty!" && exit 1; fi
          ls -la dist/

      - name: Capacitor Sync
        run: |
          npm run build
          npx cap copy android
          npx cap sync android
          # Verify assets were copied properly
          echo "Verifying copied assets..."
          if [ -z "$(ls -A android/app/src/main/assets/public/)" ]; then 
            echo "CRITICAL: Assets directory is empty! Sync failed."
            exit 1
          fi
          du -sh android/app/src/main/assets/public/

      - name: Build Android Debug APK
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"
          cache-overwrite-existing: true
          # Skip validation as the binary might be regenerated/modified
          validate-wrappers: false

      - name: Execute Gradle Build
        run: |
          cd android
          # Ensure the wrapper jar exists by regenerating it if needed
          gradle wrapper --gradle-version 8.14.3 --distribution-type all
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon -PminifyEnabled=false

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AP_NOTES_PRO_V1.2.5_DEBUG_STABLE
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Web Assets (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: ap-notes-web-build
          path: dist/
