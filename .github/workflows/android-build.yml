name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci || npm install
          # Fix for Tailwind Oxide native binding issue in CI
          npm install @tailwindcss/oxide-linux-x64-gnu

      - name: Build Web Application
        run: |
          npm run build
          # Verify dist exists and is not empty
          if [ ! -d "dist" ]; then echo "dist directory missing!" && exit 1; fi
          if [ -z "$(ls -A dist)" ]; then echo "dist directory is empty!" && exit 1; fi
          ls -la dist/

      - name: Capacitor Sync
        run: |
          npx cap sync android
          # Ensure android project is in a clean state
          cd android
          rm -rf app/build
          ls -la app/src/main/assets/public/ || echo "Public assets not found"

      - name: Build Android Debug APK
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"
          cache-overwrite-existing: true
          validate-wrappers: false

      - name: Execute Gradle Build
        run: |
          cd android
          # Force regenerate the wrapper to fix "Invalid or corrupt jarfile"
          gradle wrapper --gradle-version 8.14.3 --distribution-type all
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AP_NOTES_DEBUG_V1.2.4
          path: android/app/build/outputs/apk/debug/app-debug.apk