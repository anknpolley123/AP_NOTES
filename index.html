<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="dragon_bg.png" />
    <title>AP Notes Pro</title>
  </head>
  <body>
    <div id="root">
      <div style="background: #020617; position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #2563eb; font-family: -apple-system, system-ui, sans-serif; gap: 40px; text-align: center; padding: 40px;">
        <div style="position: relative; width: 140px; height: 140px; display: flex; items-center; justify-content: center;">
          <svg viewBox="0 0 100 100" style="position: absolute; inset: 0; width: 100%; height: 100%; color: #ef4444; filter: drop-shadow(0 0 10px rgba(239, 68, 68, 0.4));" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M70,30 C80,30 85,40 85,50 C85,60 75,65 65,65 L40,65 C30,65 20,55 20,40 C20,25 30,15 45,15 C60,15 70,25 70,30 Z" fill="currentColor" fill-opacity="0.1" />
            <path d="M85,50 L95,55" stroke-width="4" style="animation: flicker 0.2s infinite;" />
            <path d="M20,40 Q15,60 30,80 Q45,100 70,85" />
          </svg>
          <div style="position: relative; z-index: 10; font-size: 56px; font-weight: 900; font-style: italic; color: #ffffff; letter-spacing: -0.05em; display: flex; align-items: center; justify-content: center; height: 100%;">AP</div>
        </div>
        <div>
          <div style="font-size: 56px; font-weight: 900; font-style: italic; letter-spacing: -0.05em; margin-bottom: 8px; color: #ffffff;">AP_NOTES</div>
          <div style="font-size: 16px; font-weight: 900; letter-spacing: 0.8em; opacity: 0.6; color: #2563eb; padding-left: 0.8em;">AI_WORKSPACE</div>
        </div>
        <div style="margin-top: 40px;">
          <div style="width: 240px; height: 6px; background: #0f172a; border-radius: 3px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);">
            <div style="width: 40%; height: 100%; background: linear-gradient(90deg, #1e40af, #2563eb, #1e40af); background-size: 200% 100%; border-radius: 3px; animation: loading 2.5s ease-in-out infinite, gradientMove 2s linear infinite;"></div>
          </div>
          <div style="margin-top: 20px; font-size: 10px; font-weight: 900; color: #475569; text-transform: uppercase; letter-spacing: 0.4em; animation: fadeInOut 2s infinite;">System Core v1.2.4_Stable</div>
        </div>
      </div>
      <style>
        @keyframes gradientMove {
          0% { background-position: 0% 50%; }
          100% { background-position: 200% 50%; }
        }
        @keyframes pulse {
          0% { transform: scale(1); box-shadow: 0 0 40px rgba(37, 99, 235, 0.2); }
          50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(37, 99, 235, 0.4); }
          100% { transform: scale(1); box-shadow: 0 0 40px rgba(37, 99, 235, 0.2); }
        }
        @keyframes loading {
          0% { transform: translateX(-100%); }
          100% { transform: translateX(200%); }
        }
        @keyframes fadeInOut {
          0%, 100% { opacity: 0.5; }
          50% { opacity: 1; }
        }
        @keyframes flicker {
          0%, 100% { opacity: 1; transform: translateX(0); }
          50% { opacity: 0.8; transform: translateX(2px); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
