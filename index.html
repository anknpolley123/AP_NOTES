<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="dragon_bg.png" />
    <title>AP Notes OCR</title>
  </head>
  <body>
    <div id="root">
      <div style="background: #020617; position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #2563eb; font-family: -apple-system, system-ui, sans-serif; gap: 30px; text-align: center; padding: 20px;">
        <div style="width: 100px; height: 100px; border: 4px solid #2563eb; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 50px; font-weight: 900; font-style: italic; box-shadow: 0 0 50px rgba(37, 99, 235, 0.4); animation: pulse 2s infinite;">AP</div>
        <div>
          <div style="font-size: 48px; font-weight: 900; font-style: italic; letter-spacing: -0.05em; margin-bottom: 5px;">AP_NOTES</div>
          <div style="font-size: 14px; font-weight: 900; letter-spacing: 0.6em; opacity: 0.5; color: #ffffff;">AI WORKSPACE PRO</div>
        </div>
        <div style="margin-top: 20px; font-size: 12px; font-weight: 800; color: #64748b; text-transform: uppercase; letter-spacing: 0.2em;">Initializing Systems...</div>
      </div>
      <style>
        @keyframes pulse {
          0% { transform: scale(1); opacity: 1; }
          50% { transform: scale(1.05); opacity: 0.8; }
          100% { transform: scale(1); opacity: 1; }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
