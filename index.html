<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="dragon_bg.png" />
    <title>AP Notes Pro</title>
  </head>
  <body>
    <div id="root">
      <div id="preloader" style="background: #020617; position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: -apple-system, system-ui, sans-serif; z-index: 10000; overflow: hidden;">
        <div style="position: relative; animation: fadeIn 1s ease-out;">
          <div style="width: 120px; height: 120px; border-radius: 30px; background: linear-gradient(135deg, #1e40af, #2563eb); display: flex; align-items: center; justify-content: center; box-shadow: 0 0 50px rgba(37, 99, 235, 0.3); margin-bottom: 30px; position: relative; overflow: hidden;">
             <div style="font-size: 40px; font-weight: 900; font-style: italic; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.2); z-index: 2;">AP</div>
             <div style="position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent); animation: shine 3s infinite;"></div>
          </div>
        </div>
        <div style="text-align: center; max-width: 300px;">
          <div style="font-size: 32px; font-weight: 900; font-style: italic; letter-spacing: -0.05em; margin-bottom: 10px; color: white;">AP_NOTES</div>
          <div id="preloader-status" style="font-size: 10px; font-weight: 900; letter-spacing: 0.5em; opacity: 0.4; color: #3b82f6; text-transform: uppercase; margin-bottom: 30px;">Initializing_System</div>
          <div style="width: 200px; height: 2px; background: rgba(255,255,255,0.05); border-radius: 1px; overflow: hidden;">
            <div id="preloader-progress" style="width: 0%; height: 100%; background: #3b82f6; box-shadow: 0 0 10px #3b82f6; transition: width 0.3s ease;"></div>
          </div>
          <div style="margin-top: 15px; font-size: 8px; opacity: 0.3; letter-spacing: 0.2em;">V1.2.5_PRO_LOADER</div>
        </div>
      </div>
      <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shine { 0% { transform: translate(-50%, -50%) rotate(45deg); } 100% { transform: translate(150%, 150%) rotate(45deg); } }
      </style>
    </div>
    
    <script>
      (function() {
        const bar = document.getElementById('preloader-progress');
        const status = document.getElementById('preloader-status');
        let progress = 0;
        const messages = ['Establishing_Link', 'Syncing_Core', 'Loading_Modules', 'Optimizing_UI', 'Ready'];
        
        const interval = setInterval(() => {
          if (progress < 95) {
            progress += Math.random() * 8;
            if (progress > 95) progress = 95;
            if (bar) bar.style.width = progress + '%';
            
            const msgIdx = Math.floor((progress / 100) * messages.length);
            if (status) status.innerText = messages[msgIdx];
          }
        }, 300);

        // Safety self-destruction
        setTimeout(() => {
          const loader = document.getElementById('preloader');
          if (loader) {
            loader.style.transition = 'opacity 0.6s ease';
            loader.style.opacity = '0';
            setTimeout(() => { if(loader.parentNode) loader.parentNode.removeChild(loader); }, 600);
          }
        }, 15000);
      })();
    </script>
      window.onerror = function(msg, url, line, col, error) {
        console.error('GLOBAL_ERROR:', msg, 'at', url, ':', line, ':', col, error);
        return false;
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
