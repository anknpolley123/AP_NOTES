<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="dragon_bg.png" />
    <title>AP Notes Pro</title>
  </head>
  <body>
    <div id="root">
      <div style="background: #020617; position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #2563eb; font-family: -apple-system, system-ui, sans-serif; gap: 40px; text-align: center; padding: 40px;">
        <div style="position: relative;">
          <div style="width: 120px; height: 120px; border: 6px solid #2563eb; border-radius: 40px; display: flex; align-items: center; justify-content: center; font-size: 60px; font-weight: 900; font-style: italic; box-shadow: 0 0 60px rgba(37, 99, 235, 0.4); animation: pulse 2s infinite;">AP</div>
          <div style="position: absolute; top: -10px; right: -10px; width: 30px; height: 30px; background: #2563eb; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="m13 2-2 10h8l-2 10"></path></svg>
          </div>
        </div>
        <div>
          <div style="font-size: 56px; font-weight: 900; font-style: italic; letter-spacing: -0.05em; margin-bottom: 8px; color: #ffffff;">AP_NOTES</div>
          <div style="font-size: 16px; font-weight: 900; letter-spacing: 0.8em; opacity: 0.6; color: #2563eb; padding-left: 0.8em;">AI_WORKSPACE</div>
        </div>
        <div style="margin-top: 40px;">
          <div style="width: 240px; height: 6px; background: #0f172a; border-radius: 3px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05);">
            <div style="width: 40%; height: 100%; background: linear-gradient(90deg, #1e40af, #2563eb, #1e40af); background-size: 200% 100%; border-radius: 3px; animation: loading 2.5s ease-in-out infinite, gradientMove 2s linear infinite;"></div>
          </div>
          <div style="margin-top: 20px; font-size: 10px; font-weight: 900; color: #475569; text-transform: uppercase; letter-spacing: 0.4em; animation: fadeInOut 2s infinite;">System Core v1.2.4_Stable</div>
        </div>
      </div>
      <style>
        @keyframes gradientMove {
          0% { background-position: 0% 50%; }
          100% { background-position: 200% 50%; }
        }
        @keyframes pulse {
          0% { transform: scale(1); box-shadow: 0 0 40px rgba(37, 99, 235, 0.2); }
          50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(37, 99, 235, 0.4); }
          100% { transform: scale(1); box-shadow: 0 0 40px rgba(37, 99, 235, 0.2); }
        }
        @keyframes loading {
          0% { transform: translateX(-100%); }
          100% { transform: translateX(200%); }
        }
        @keyframes fadeInOut {
          0%, 100% { opacity: 0.5; }
          50% { opacity: 1; }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
