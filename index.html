<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="dragon_bg.png" />
    <title>AP Notes Pro</title>
  </head>
  <body>
    <div id="root">
      <div style="background: #020617; position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: white; font-family: sans-serif;">
        <div style="text-align: center;">
          <div style="font-size: 24px; font-weight: bold; margin-bottom: 20px;">AP_NOTES</div>
          <div style="font-size: 12px; opacity: 0.5;">INITIALIZING...</div>
        </div>
      </div>
    </div>
      <style>
        @keyframes gradientMove {
          0% { background-position: 0% 50%; }
          100% { background-position: 200% 50%; }
        }
        @keyframes pulse {
          0% { transform: scale(1); box-shadow: 0 0 40px rgba(37, 99, 235, 0.2); }
          50% { transform: scale(1.05); box-shadow: 0 0 80px rgba(37, 99, 235, 0.4); }
          100% { transform: scale(1); box-shadow: 0 0 40px rgba(37, 99, 235, 0.2); }
        }
        @keyframes loading {
          0% { transform: translateX(-100%); }
          100% { transform: translateX(200%); }
        }
        @keyframes fadeInOut {
          0%, 100% { opacity: 0.5; }
          50% { opacity: 1; }
        }
        @keyframes flicker {
          0%, 100% { opacity: 1; transform: translateX(0); }
          50% { opacity: 0.8; transform: translateX(2px); }
        }
      </style>
    </div>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        console.error('GLOBAL_ERROR:', msg, 'at', url, ':', line, ':', col, error);
        return false;
      };
      window.onunhandledrejection = function(event) {
        console.error('UNHANDLED_REJECTION:', event.reason);
      };
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
